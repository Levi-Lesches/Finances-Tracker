name: finances
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 0.1.0+1

environment:
  sdk: ^3.10.0
  flutter: ^3.38.5

dependencies:
  collection: ^1.19.1
  file_picker: 10.3.10
  flutter:
    sdk: flutter
  go_router: ^14.2.7
  intl: ^0.20.2
  path_provider: ^2.1.5
  uuid: ^4.5.3

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: images/icon.png
  min_sdk_android: 21
  android: true
  adaptive_icon_background: "#0094A9"
  adaptive_icon_foreground: images/ic_launcher_foreground.png
  adaptive_icon_monochrome: images/ic_launcher_foreground.png
